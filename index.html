<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helloagi.ai – Domain For Sale</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- AOS animations -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <!-- Styles -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #fff;
      text-align: center;
    }

    #hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #6f5ff3, #5fc3f3);
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
    }
    .hero-content { position: relative; z-index: 2; }

    h1 { font-size: 3rem; margin-bottom: 1rem; }
    p { font-size: 1.2rem; margin-bottom: 2rem; }

    .btn-contact {
      background: #fff;
      color: #0d0d0d;
      padding: 0.8rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn-contact:hover { background: #e2e2e2; }

    /* Contact / Offer Section */
    .contact-section {
      padding: 4rem 2rem;
      background: #121212;
    }
    .contact-section h2 { margin-bottom: 1rem; }
    .contact-section p {
      font-size: 1.2rem;
      color: #fff;
    }
    .contact-email {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.8rem 1.2rem;
      background: #6f5ff3;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }
    .contact-email:hover { background: #5746c3; }

    footer {
      padding: 2rem;
      font-size: 0.9rem;
      background: #0f0f0f;
    }
  </style>
</head>
<body>

<!-- Hero Section -->
<section id="hero">
  <div id="particles-js"></div>
  <div class="hero-content" data-aos="fade-up">
    <h1>📛 helloagi.ai</h1>
    <p>This premium domain is available for purchase.</p>
    <a href="#contact" class="btn-contact">Contact for Offer</a>
  </div>
</section>

<!-- Contact / Offer Section -->
<section id="contact" class="contact-section" data-aos="fade-up">
  <h2>Interested in Buying?</h2>
  <p>You can contact us directly via email:</p>
  <a href="mailto:impexintlfze@gmail.com" class="contact-email">impexintlfze@gmail.com</a>
</section>

<!-- Footer -->
<footer data-aos="fade-up">
  <p>helloagi.ai is a premium domain name for sale.</p>
  <p>&copy; 2026 helloagi.ai</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 1000, once: true });

  particlesJS("particles-js", {
    "particles": {
      "number": { "value": 60 },
      "color": { "value": "#ffffff" },
      "shape": { "type": "circle" },
      "opacity": { "value": 0.4 },
      "size": { "value": 3 },
      "line_linked": { "enable": true, "distance": 140, "color": "#ffffff", "opacity": 0.4, "width": 1 },
      "move": { "enable": true, "speed": 2 }
    },
    "interactivity": {
      "events": { "onhover": { "enable": true, "mode": "repulse" } }
    },
    "retina_detect": true
  });
</script>

</body>
</html>
